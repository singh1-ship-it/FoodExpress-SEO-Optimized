<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Analytics 4 -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-JF8P9KBQK1"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-JF8P9KBQK1');
    </script>

    <!-- Microsoft Clarity -->
    <script type="text/javascript">
        (function(c,l,a,r,i,t,y){
            c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
            t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
            y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
        })(window, document, "clarity", "script", "wcy5xluvbk");
    </script>

    <!-- SEO Meta Tags -->
    <title>FoodExpress Goa | Fast Food Delivery in Mapusa & Goa</title>
    <meta name="description" content="Order delicious food online from top restaurants in Mapusa & Goa. Fast, hot & contactless delivery with daily offers.">

    <style>
        * {
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 15px;
            text-align: center;
            background-color: #ffffff;
            color: #333;
            line-height: 1.6;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        h1 {
            color: #e23744;
            font-size: 1.8rem;
            margin: 30px 0 15px;
        }
        p {
            font-size: 1.05rem;
            max-width: 680px;
            margin: 12px auto;
        }
        .offers {
            font-size: 1.1rem;
            font-weight: bold;
            margin: 20px 0;
            color: #e23744;
        }
        img {
            max-width: 100%;
            width: 100%;
            height: auto;
            border-radius: 12px;
            margin: 25px 0;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: block;
        }
        .btn {
            display: inline-block;
            width: 100%;
            max-width: 320px;
            padding: 16px 24px;
            font-size: 1.15rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            margin: 10px 8px;
            font-weight: 600;
        }
        .btn-order {
            background-color: #e23744;
            color: white;
        }
        .btn-order:hover {
            background-color: #c02c38;
        }
        .btn-interest {
            background-color: #28a745;
            color: white;
        }
        .btn-interest:hover {
            background-color: #218838;
        }

        /* Mobile Optimizations */
        @media (max-width: 480px) {
            h1 {
                font-size: 1.65rem;
            }
            p {
                font-size: 1rem;
            }
            .btn {
                font-size: 1.1rem;
                padding: 14px 20px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>FoodExpress - Fast Food Delivery in Goa</h1>
        
        <p>Order your favorite meals from the best restaurants in Mapusa &amp; Goa.<br>
           Fresh, hot, and delivered fast with contactless safety.</p>
        
        <p class="offers">
            Enjoy daily offers: <strong>30% OFF</strong> | 
            <strong>Buy 1 Get 1 Free</strong> | 
            <strong>Free Delivery</strong>
        </p>

        <img src="https://i.postimg.cc/YC1nBPSq/8a761645-64a0-4fd0-a6a4-1e0593600f00.jpg" 
             alt="FoodExpress Goa - Hot and fresh food delivery from top restaurants"
             loading="lazy">

        <!-- Buttons -->
        <button class="btn btn-order" onclick="window.location.href='https://foodexpress.com/order'">
            Order Now - Get 30% OFF
        </button>

        <button class="btn btn-interest" onclick="trackInterest()">
            I'm Interested - Track My Visit
        </button>
    </div>

    <script>
        function trackInterest() {
            if (typeof gtag === 'function') {
                gtag('event', 'button_click', {
                    event_category: 'engagement',
                    event_label: 'Interested in Offers',
                    value: 1
                });
            }
            alert("Thank you! Your interest has been recorded. We'll show you better offers soon! 😊");
        }
    </script>

</body>
</html>
